[build]
builder = "nixpacks"

[deploy]
startCommand = "uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# VALOR model storage — persistent volume keeps trained models across deploys.
# Create a Railway Volume named "valor-models" in the dashboard first.
[[volumes]]
mountPath = "/app/models"
name = "valor-models"
