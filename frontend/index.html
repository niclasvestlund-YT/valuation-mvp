<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Värdekoll — Begagnatvärde för teknik</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      :root {
        --bg-base: #F7F5F0;
        --bg-surface: #EDEAE3;
        --bg-surface-raised: #FFFFFF;
        --bg-overlay: rgba(44,42,37,0.5);
        --border-subtle: #E8E4DB;
        --border-medium: #D5D0C5;
        --text-primary: #2C2A25;
        --text-secondary: #5C5850;
        --text-muted: #8A8578;
        --text-faint: #B0AA9E;
        --accent-positive: #34a873;
        --accent-warning: #d4a017;
        --accent-danger: #c4432a;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background: var(--bg-base);
        color: var(--text-primary);
        font-size: 0.875rem;
        line-height: 1.375;
        -webkit-font-smoothing: antialiased;
      }

      /* ─── Layout ─── */
      .app {
        max-width: 520px;
        margin: 0 auto;
        padding: 0 16px;
        min-height: 100dvh;
      }

      /* ─── Header ─── */
      .app-header {
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        padding: 20px 0 16px;
      }

      .app-logo {
        font-size: 0.6875rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--text-faint);
      }

      .app-menu-btn {
        position: absolute;
        right: 0;
        background: none;
        border: none;
        padding: 4px;
        cursor: pointer;
        color: var(--text-muted);
        display: flex;
        align-items: center;
      }

      .adm-nav-btn {
        position: absolute;
        left: 0;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 6px 12px;
        border-radius: 14px;
        border: 1px solid var(--border-medium);
        background: var(--bg-surface);
        color: var(--text-muted);
        font-family: inherit;
        font-size: 0.8125rem;
        text-decoration: none;
        transition: color 150ms, border-color 150ms;
      }
      .adm-nav-btn:hover { color: var(--text-primary); border-color: var(--text-muted); }

      /* ─── Typography utilities ─── */
      .text-xs  { font-size: 0.6875rem; line-height: 1rem; }
      .text-sm  { font-size: 0.8125rem; line-height: 1.25rem; }
      .text-base{ font-size: 0.875rem;  line-height: 1.375rem; }
      .text-lg  { font-size: 0.9375rem; line-height: 1.5rem; }
      .text-xl  { font-size: 1.125rem;  line-height: 1.375rem; }
      .text-2xl { font-size: 1.25rem;   line-height: 1.5rem; }
      .text-hero{ font-size: 3.25rem;   line-height: 1; }

      .text-primary   { color: var(--text-primary); }
      .text-secondary { color: var(--text-secondary); }
      .text-muted     { color: var(--text-muted); }
      .text-faint     { color: var(--text-faint); }

      .section-header {
        font-size: 0.6875rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--text-faint);
        margin-bottom: 10px;
      }

      /* ─── Upload Screen ─── */
      .upload-screen {
        padding-bottom: 32px;
      }

      .upload-hero {
        padding: 24px 0 28px;
      }

      .upload-hero h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--text-primary);
        line-height: 1.4;
        margin-bottom: 6px;
      }

      .upload-hero p {
        font-size: 0.9375rem;
        color: var(--text-muted);
        line-height: 1.5;
      }

      .upload-area {
        background: var(--bg-surface);
        border: 2px dashed var(--border-medium);
        border-radius: 20px;
        min-height: 180px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        cursor: pointer;
        position: relative;
        transition: border-color 0.15s ease, background 0.15s ease;
        padding: 28px 16px;
      }

      .upload-area:hover,
      .upload-area.drag-over {
        border-color: var(--text-muted);
        background: var(--border-subtle);
      }

      .upload-area input[type="file"] {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
        width: 100%;
        height: 100%;
      }

      .upload-icon-wrap {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: var(--bg-base);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .upload-area-label {
        font-size: 0.9375rem;
        font-weight: 500;
        color: var(--text-primary);
        text-align: center;
      }

      .upload-area-sub {
        font-size: 0.8125rem;
        color: var(--text-muted);
        text-align: center;
      }

      /* ─── Thumbnail Row ─── */
      .thumb-row {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding: 14px 0 4px;
        scrollbar-width: none;
      }

      .thumb-row::-webkit-scrollbar { display: none; }

      .thumb-item {
        flex-shrink: 0;
        width: 72px;
        height: 72px;
        border-radius: 12px;
        overflow: hidden;
        background: var(--bg-surface);
        border: 1px solid var(--border-subtle);
      }

      .thumb-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      /* ─── Tips Row ─── */
      .tips-section {
        margin-top: 24px;
      }

      .tips-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .tip-card {
        background: var(--bg-surface);
        border-radius: 10px;
        padding: 12px 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        text-align: center;
      }

      .tip-card-label {
        font-size: 0.6875rem;
        color: var(--text-secondary);
        line-height: 1.3;
      }

      /* ─── Submit Button ─── */
      .btn-primary {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        height: 48px;
        background: var(--text-primary);
        color: var(--bg-base);
        border: none;
        border-radius: 14px;
        font-size: 0.875rem;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        transition: opacity 0.15s ease;
        margin-top: 20px;
      }

      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn-secondary {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        height: 48px;
        background: transparent;
        color: var(--text-secondary);
        border: 1px solid var(--border-medium);
        border-radius: 14px;
        font-size: 0.875rem;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        transition: border-color 0.15s ease;
        padding: 0 20px;
      }

      .btn-secondary:hover {
        border-color: var(--text-muted);
      }

      /* ─── Scanning / Loading ─── */
      .scanning-screen {
        padding: 20px 0 32px;
      }

      .scan-photo {
        width: 100%;
        height: 220px;
        object-fit: cover;
        border-radius: 16px;
        display: block;
        background: var(--bg-surface);
      }

      .scan-steps {
        margin-top: 24px;
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .scan-step {
        display: flex;
        align-items: flex-start;
        gap: 14px;
        padding: 14px 0;
        border-bottom: 1px solid var(--border-subtle);
      }

      .scan-step:last-child {
        border-bottom: none;
      }

      .step-circle {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 1px;
      }

      .step-circle.done {
        background: var(--text-primary);
      }

      .step-circle.active {
        border: 2px solid var(--text-muted);
        background: transparent;
        animation: pulse-border 1.4s ease-in-out infinite;
      }

      .step-circle.waiting {
        border: 2px solid var(--border-medium);
        background: transparent;
      }

      .step-circle .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--text-muted);
      }

      @keyframes pulse-border {
        0%, 100% { border-color: var(--text-muted); opacity: 1; }
        50% { border-color: var(--border-medium); opacity: 0.5; }
      }

      .step-body {
        flex: 1;
      }

      .step-title {
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--text-primary);
        line-height: 1.4;
      }

      .step-title.muted {
        color: var(--text-muted);
        font-weight: 400;
      }

      .step-sub {
        font-size: 0.8125rem;
        color: var(--text-muted);
        margin-top: 2px;
      }

      /* ─── Result: Quick View ─── */
      .result-screen {
        padding: 8px 0 32px;
      }

      .product-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 16px 0;
      }

      .product-thumb {
        width: 52px;
        height: 52px;
        border-radius: 12px;
        object-fit: cover;
        background: var(--bg-surface);
        flex-shrink: 0;
        display: block;
      }

      .product-thumb-placeholder {
        width: 52px;
        height: 52px;
        border-radius: 12px;
        background: var(--bg-surface);
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .product-info {
        flex: 1;
        min-width: 0;
      }

      .product-name {
        font-size: 1.125rem;
        font-weight: 600;
        color: var(--text-primary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .product-sub {
        font-size: 0.6875rem;
        color: var(--text-muted);
        margin-top: 2px;
      }

      .match-quality-badge {
        display: inline-flex;
        align-items: center;
        margin-top: 4px;
        padding: 2px 8px;
        background: rgba(212, 160, 23, 0.12);
        color: var(--accent-warning);
        border-radius: 100px;
        font-size: 0.625rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .product-edit-btn {
        background: none;
        border: none;
        padding: 6px;
        cursor: pointer;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        flex-shrink: 0;
      }

      .estimate-section {
        padding: 8px 0 16px;
      }

      .estimate-value {
        font-size: 3.25rem;
        font-weight: 700;
        color: var(--text-primary);
        letter-spacing: -0.04em;
        line-height: 1;
        margin: 6px 0 8px;
      }

      .estimate-info-line {
        font-size: 0.875rem;
        color: var(--text-muted);
      }

      /* ─── Value Retention Bar ─── */
      .retention-bar-wrap {
        background: var(--bg-surface);
        border-radius: 14px;
        padding: 14px 16px;
        margin: 8px 0 16px;
      }

      .retention-bar-top {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        margin-bottom: 10px;
      }

      .retention-bar-label {
        font-size: 0.8125rem;
        color: var(--text-secondary);
      }

      .retention-pct {
        font-size: 0.9375rem;
        font-weight: 700;
        color: var(--text-primary);
      }

      .retention-bar-track {
        height: 6px;
        border-radius: 99px;
        background: var(--border-subtle);
        overflow: hidden;
      }

      .retention-bar-fill {
        height: 100%;
        border-radius: 99px;
        background: var(--text-primary);
        transition: width 0.6s ease;
      }

      /* ─── Action Buttons Row ─── */
      .actions-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin: 4px 0 16px;
      }

      .quick-links {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 8px 0;
      }

      .quick-link {
        font-size: 0.6875rem;
        color: var(--text-muted);
        text-decoration: underline;
        text-underline-offset: 2px;
        cursor: pointer;
        background: none;
        border: none;
        font-family: inherit;
        padding: 0;
      }

      .result-timestamp {
        font-size: 0.6875rem;
        color: var(--text-faint);
        text-align: center;
        margin-top: 8px;
      }

      /* ─── Advanced View ─── */
      .advanced-view {
        overflow: hidden;
        transition: max-height 0.35s ease-out;
        max-height: 0;
      }

      .advanced-view.open {
        max-height: 9999px;
      }

      .advanced-inner {
        padding-top: 8px;
        border-top: 1px solid var(--border-subtle);
        margin-top: 4px;
        display: flex;
        flex-direction: column;
        gap: 24px;
        padding-bottom: 16px;
      }

      .adv-section {
        display: flex;
        flex-direction: column;
      }

      /* Source chips */
      .source-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .source-chip {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 5px 10px;
        background: var(--bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: 99px;
        font-size: 0.8125rem;
        color: var(--text-secondary);
      }

      /* Dot plot */
      .dot-plot-wrap {
        background: var(--bg-surface);
        border-radius: 12px;
        padding: 16px;
      }

      .dot-plot-axis {
        display: flex;
        justify-content: space-between;
        margin-top: 6px;
      }

      /* Quick comparables (main view) */
      .quick-comparables-wrap {
        margin-top: 16px;
      }

      .quick-comparables-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        margin-bottom: 8px;
      }

      .quick-comparables-title {
        font-size: 0.6875rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--text-muted);
      }

      .quick-comparables-hint {
        font-size: 0.6875rem;
        color: var(--text-muted);
      }

      .quick-comparables-list {
        display: flex;
        flex-direction: column;
        background: var(--bg-surface);
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid var(--border-subtle);
      }

      .quick-comparable-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-bottom: 1px solid var(--border-subtle);
      }

      .quick-comparable-row:last-child {
        border-bottom: none;
      }

      .quick-comparable-left {
        flex: 1;
        min-width: 0;
      }

      .quick-comparable-title {
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--text-primary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .quick-comparable-sub {
        font-size: 0.6875rem;
        color: var(--text-muted);
        margin-top: 2px;
        display: flex;
        align-items: center;
        gap: 4px;
        flex-wrap: wrap;
      }

      .quick-comparable-price {
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--text-primary);
        flex-shrink: 0;
        font-variant-numeric: tabular-nums;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .quick-comparable-link {
        display: flex;
        align-items: center;
      }

      /* Comparable listings (advanced view) */
      .comparables-list {
        display: flex;
        flex-direction: column;
        background: var(--bg-surface);
        border-radius: 12px;
        overflow: hidden;
      }

      .comparable-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 14px;
        border-bottom: 1px solid var(--border-subtle);
      }

      .comparable-row:last-child {
        border-bottom: none;
      }

      .comparable-body {
        flex: 1;
        min-width: 0;
      }

      .comparable-title {
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--text-primary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .comparable-meta {
        font-size: 0.6875rem;
        color: var(--text-muted);
        margin-top: 2px;
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }

      .condition-tag {
        display: inline-block;
        padding: 1px 6px;
        background: var(--bg-base);
        border: 1px solid var(--border-subtle);
        border-radius: 6px;
        font-size: 0.6875rem;
        color: var(--text-muted);
      }

      .comparable-price {
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--text-primary);
        flex-shrink: 0;
        font-variant-numeric: tabular-nums;
      }

      .show-all-link {
        display: block;
        text-align: center;
        font-size: 0.8125rem;
        color: var(--text-muted);
        text-decoration: underline;
        text-underline-offset: 2px;
        padding: 10px;
        cursor: pointer;
        background: none;
        border: none;
        width: 100%;
        font-family: inherit;
      }

      /* Reasoning */
      .reasoning-block {
        border-left: 2px solid var(--border-medium);
        padding-left: 16px;
        color: var(--text-secondary);
        font-size: 0.875rem;
        line-height: 1.65;
      }

      /* Feedback */
      .feedback-block {
        background: var(--bg-surface);
        border-radius: 12px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .feedback-label {
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--text-primary);
      }

      .feedback-btns {
        display: flex;
        gap: 8px;
      }

      .feedback-btn {
        flex: 1;
        height: 36px;
        border: 1px solid var(--border-medium);
        border-radius: 10px;
        background: var(--bg-base);
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--text-secondary);
        cursor: pointer;
        font-family: inherit;
        transition: border-color 0.15s, background 0.15s;
      }

      .feedback-btn:hover {
        border-color: var(--text-muted);
      }

      .feedback-btn.selected-yes {
        background: var(--accent-positive);
        border-color: var(--accent-positive);
        color: #fff;
      }

      .feedback-btn.selected-no {
        background: var(--text-primary);
        border-color: var(--text-primary);
        color: var(--bg-base);
      }

      /* Next steps */
      .next-steps-list {
        background: var(--bg-surface);
        border-radius: 12px;
        overflow: hidden;
      }

      .next-step-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px;
        border-bottom: 1px solid var(--border-subtle);
        cursor: pointer;
        text-decoration: none;
        color: var(--text-primary);
        font-size: 0.875rem;
        font-weight: 500;
        transition: background 0.12s;
      }

      .next-step-row:last-child {
        border-bottom: none;
      }

      .next-step-row:hover {
        background: var(--border-subtle);
      }

      /* ─── Ambiguous State ─── */
      .ambiguous-screen {
        padding: 8px 0 32px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .state-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 0.6875rem;
        font-weight: 600;
        letter-spacing: 0.05em;
      }

      .state-badge.warning {
        background: rgba(212, 160, 23, 0.12);
        color: var(--accent-warning);
      }

      .state-badge.danger {
        background: rgba(196, 67, 42, 0.10);
        color: var(--accent-danger);
      }

      .state-photo-wrap {
        position: relative;
        width: 100%;
        height: 200px;
        border-radius: 16px;
        overflow: hidden;
      }

      .state-photo {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        background: var(--bg-surface);
      }

      .state-photo-badge {
        position: absolute;
        top: 12px;
        right: 12px;
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 0.6875rem;
        font-weight: 600;
        background: rgba(212, 160, 23, 0.88);
        color: #fff;
      }

      .extra-angles-block {
        background: var(--bg-surface);
        border-radius: 14px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .extra-angles-label {
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--text-primary);
      }

      .angle-slots {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .angle-slot {
        height: 80px;
        background: var(--bg-base);
        border: 2px dashed var(--border-medium);
        border-radius: 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        cursor: pointer;
        position: relative;
      }

      .angle-slot input[type="file"] {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
      }

      .angle-slot-label {
        font-size: 0.6875rem;
        color: var(--text-muted);
        text-align: center;
      }

      .blockquote-note {
        border-left: 2px solid var(--border-medium);
        padding-left: 16px;
        font-size: 0.875rem;
        color: var(--text-secondary);
        line-height: 1.6;
      }

      /* ─── Insufficient Evidence State ─── */
      .insufficient-screen {
        padding: 8px 0 32px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .empty-state-icon {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: var(--bg-surface);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .found-data-list {
        background: var(--bg-surface);
        border-radius: 12px;
        overflow: hidden;
      }

      .found-data-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 16px;
        border-bottom: 1px solid var(--border-subtle);
        font-size: 0.875rem;
      }

      .found-data-row:last-child { border-bottom: none; }

      .lowest-price-badge {
        display: inline-block;
        font-size: 0.625rem;
        font-weight: 600;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        color: var(--accent-positive, #34a873);
        background: rgba(52, 168, 115, 0.1);
        padding: 2px 6px;
        border-radius: 4px;
        margin-left: 8px;
        vertical-align: middle;
      }

      .new-price-highlight {
        font-weight: 600;
        color: var(--text-primary);
      }

      .compare-links-wrap {
        display: flex;
        justify-content: center;
        gap: 16px;
        padding: 12px 16px 4px;
      }

      .compare-prices-link {
        font-size: 0.8125rem;
        color: var(--text-muted);
        text-decoration: none;
        transition: color 0.15s;
      }

      .compare-prices-link:hover {
        color: var(--text-primary);
      }

      /* ─── Error State ─── */
      .error-screen {
        padding: 8px 0 32px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 16px;
      }

      /* ─── Manual Correction Sheet ─── */
      .overlay {
        position: fixed;
        inset: 0;
        background: var(--bg-overlay);
        z-index: 50;
        display: flex;
        align-items: flex-end;
      }

      .overlay.hidden { display: none; }

      .correction-sheet {
        background: var(--bg-surface-raised);
        border-radius: 20px 20px 0 0;
        box-shadow: 0 -4px 24px rgba(0,0,0,0.08);
        width: 100%;
        padding: 16px 20px 40px;
        max-height: 80dvh;
        overflow-y: auto;
      }

      .sheet-handle {
        width: 36px;
        height: 4px;
        border-radius: 2px;
        background: var(--border-subtle);
        margin: 0 auto 20px;
      }

      .sheet-title {
        font-size: 1.25rem;
        font-weight: 600;
        color: var(--text-primary);
        margin-bottom: 4px;
      }

      .sheet-sub {
        font-size: 0.8125rem;
        color: var(--text-muted);
        margin-bottom: 20px;
      }

      .manual-form {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .manual-input {
        width: 100%;
        height: 44px;
        padding: 0 14px;
        border: 1px solid var(--border-medium);
        border-radius: 10px;
        background: var(--bg-surface);
        font-size: 0.875rem;
        font-family: inherit;
        color: var(--text-primary);
        outline: none;
      }

      .manual-input:focus {
        border-color: var(--text-muted);
      }

      .manual-input::placeholder {
        color: var(--text-faint);
      }

      .sheet-cancel {
        display: block;
        text-align: center;
        font-size: 0.6875rem;
        color: var(--text-muted);
        text-decoration: underline;
        text-underline-offset: 2px;
        cursor: pointer;
        background: none;
        border: none;
        font-family: inherit;
        margin-top: 14px;
        width: 100%;
      }

      /* ─── Debug / Dev ─── */
      .dev-panel {
        background: var(--bg-surface);
        border-radius: 12px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 8px;

      .dev-panel-title {
        font-size: 0.875rem;

      .dev-panel-copy {

      .dev-grid {

      .dev-card {
        background: var(--bg-base);

      .dev-card strong {

        font-size: 0.6875rem;

        font-weight: 500;
      }

      .dev-card span {
        font-size: 0.875rem;

      }

      .dev-action-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .btn-dev {
        flex: 1;
        min-width: 120px;
        height: 36px;
        border: 1px solid var(--border-medium);
        border-radius: 10px;
        background: var(--bg-base);
        font-size: 0.8125rem;
        font-family: inherit;
        color: var(--text-secondary);
        cursor: pointer;
      }

      .dev-panel-section {
        margin-top: 8px;

      .dev-section-title {
        font-size: 0.6875rem;
        font-weight: 600;

        text-transform: uppercase;

      }

      .dev-list {
        margin: 0;
        padding-left: 18px;

        color: var(--text-secondary);
        line-height: 1.6;
      }

      .debug-id-line {
        font-size: 0.6875rem;

      /* Collapsible debug */
      .collapsible-block {

      .collapsible-block summary {

      /* ─── Utilities ─── */

    </style>
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <a href="/admin" class="adm-nav-btn">

      <!-- Scanning Screen -->
      <div id="scanningScreen" class="scanning-screen hidden">

              <div class="step-sub hidden" id="step2Sub"></div>
            </div>
          </div>
          <div class="scan-step" id="step3">
            <div class="step-circle waiting" id="step3Circle">
            </div>
            <div class="step-body">
              <div class="step-title muted" id="step3Title">Beräknar estimat</div>

      <!-- Result Container -->

    <!-- Correction Sheet Overlay -->
    <div id="correctionOverlay" class="overlay hidden">
      <div class="correction-sheet" id="correctionSheet">
        <div class="sheet-handle"></div>
        <div class="sheet-title">Rätta produkt</div>
        <div class="sheet-sub" id="sheetSub">Ange korrekt varumärke och modell</div>
        <div class="manual-form">
          <input id="brandField" class="manual-input" type="text" placeholder="Varumärke" />
          <input id="modelField" class="manual-input" type="text" placeholder='Modell, t.ex. "WH-1000XM5"' />
          <button id="correctionSubmit" class="btn-primary" type="button" style="margin-top:6px">
            Värdera igen
          </button>

    <script>
      // ─── DOM refs ───
      const imageInput       = document.getElementById("imageInput");
      const analyzeButton    = document.getElementById("analyzeButton");
      const previewRow       = document.getElementById("previewRow");
      const uploadScreen     = document.getElementById("uploadScreen");
      const scanningScreen   = document.getElementById("scanningScreen");
      const resultScreen     = document.getElementById("resultScreen");
      const scanPhoto        = document.getElementById("scanPhoto");
      const correctionOverlay= document.getElementById("correctionOverlay");
      const brandField       = document.getElementById("brandField");
      const modelField       = document.getElementById("modelField");
      const correctionSubmit = document.getElementById("correctionSubmit");
      const correctionCancel = document.getElementById("correctionCancel");

      // ─── State ───
      let currentPhotoUrl = null;
      let lastEnvelope    = null;
      let advancedOpen    = false;
      let showAllComparables = false;

      // ─── Source link map (unchanged from original) ───
      const sourceLinks = {
        "OpenAI Responses API":                              { href: "https://developers.openai.com/api/reference/responses",         meta: "Produktidentifiering" },
        "OpenAI Vision API":                                 { href: "https://developers.openai.com/api/docs/guides/images-vision",    meta: "Bildanalys" },
        "Manual override":                                   { href: "#manual-correction", meta: "Manuell korrigering" },
        "Mock vision fallback":                              { href: "#manual-correction", meta: "Fallback" },
        "Mock vision fallback (missing OPENAI_API_KEY)":     { href: "#manual-correction", meta: "Ingen API-nyckel" },
        "Mock vision fallback (no usable image data)":       { href: "#manual-correction", meta: "Ingen bilddata" },
        "Mock vision fallback (OpenAI API error)":           { href: "https://developers.openai.com/api/docs/guides/images-vision", meta: "API-fallback" },
        "Mock marketplace data":                             { href: "https://www.tradera.com/",        meta: "Marknadsreferens" },
        "Mock Google Shopping":                              { href: "https://shopping.google.com/",   meta: "Nypriskontext" },
        Tradera:                                             { href: "https://www.tradera.com/",        meta: "Andrahandsjämförelse" },
        Blocket:                                             { href: "https://www.blocket.se/",         meta: "Andrahandsjämförelse" },
        blocket_serpapi:                                     { href: "https://www.blocket.se/",         meta: "Andrahandsjämförelse" },
        tradera_serpapi:                                     { href: "https://www.tradera.com/",        meta: "Andrahandsjämförelse" },
        "SerpApi Google Shopping":                           { href: "https://serpapi.com/google-shopping-api", meta: "Nypriskontext" },
      };

      const INTERNAL_SOURCES = new Set([
        "OpenAI Responses API", "OpenAI Vision API", "Manual override",
        "Mock vision service", "Mock vision fallback",
        "Mock vision fallback (missing OPENAI_API_KEY)",
        "Mock vision fallback (no usable image data)",
        "Mock vision fallback (OpenAI API error)",
      ]);

      // ─── API ───
      function getApiUrl() {
        if (window.location.protocol === "http:" || window.location.protocol === "https:") {
          return "/value";
        }
        return "http://127.0.0.1:8000/value";
      }

      // ─── Formatting helpers (unchanged) ───
      function formatCurrency(value, currency = "SEK") {
        if (value === null || value === undefined || Number.isNaN(Number(value))) return "Okänt";
        const rounded = Math.round(Number(value));
        if (currency === "SEK") return `${new Intl.NumberFormat("sv-SE").format(rounded)} kr`;
        try {
          return new Intl.NumberFormat("sv-SE", { style: "currency", currency, maximumFractionDigits: 0 }).format(rounded);
        } catch {
          return `${new Intl.NumberFormat("sv-SE").format(rounded)} ${currency}`;
        }
      }

      function getConfidenceLabel(confidence) {
        if (confidence === null || confidence === undefined) return { label: "Okänd", className: "confidence-medium" };
        if (confidence >= 0.8) return { label: "Hög konfidens", className: "confidence-high" };
        if (confidence >= 0.6) return { label: "Medel konfidens", className: "confidence-medium" };
        return { label: "Låg konfidens", className: "confidence-low" };
      }

      function getConfidenceText(confidence) {
        const label = getConfidenceLabel(confidence);
        if (confidence === null || confidence === undefined) return label.label;
        return `${label.label} (${confidence.toFixed(2)})`;
      }

      function normalizeKey(value) {
        return String(value || "").toLowerCase().replace(/[-_\s]+/g, " ").trim();
      }

      function formatTimeAgo(dateStr) {
        if (!dateStr) return null;
        try {
          const diff = Math.floor((Date.now() - new Date(dateStr).getTime()) / 86400000);
          if (diff <= 0) return "idag";
          if (diff === 1) return "igår";
          if (diff < 7) return `${diff} dagar sedan`;
          if (diff < 30) return `${Math.floor(diff / 7)} veckor sedan`;
          if (diff < 365) return `${Math.floor(diff / 30)} mån sedan`;
          return `${Math.floor(diff / 365)} år sedan`;
        } catch { return null; }
      }

      function getDetectedProductName(data) {
        const parts = [];
        const seen = new Set();
        [data.brand, data.line, data.model, data.variant].forEach((part) => {
          if (!part) return;
          const key = normalizeKey(part);
          if (!key || seen.has(key)) return;
          // Skip if already covered by the combined string so far
          const combinedKey = parts.length ? normalizeKey(parts.join(" ")) : "";
          if (combinedKey && combinedKey.includes(key)) return;
          // Remove any existing part that the new key supersedes (new is more specific)
          const indicesToRemove = [];
          parts.forEach((existingPart, i) => {
            if (key.includes(normalizeKey(existingPart))) indicesToRemove.push(i);
          });
          for (let i = indicesToRemove.length - 1; i >= 0; i--) {
            seen.delete(normalizeKey(parts[indicesToRemove[i]]));
            parts.splice(indicesToRemove[i], 1);
          }
          parts.push(part);
          seen.add(key);
        });
        return parts.join(" ").trim();
      }

      function buildClientErrorEnvelope({ message, technicalMessage = null, debugId = "client_request_failure", errorStage = "response_build", status = "error" }) {
        const userMessage = message || "Begäran kunde inte slutföras.";
        return {
          status,
          status_title: status === "degraded" ? "Tillfälligt systemproblem" : "Kunde inte värdera enheten",
          status_message: userMessage,
          user_status_title: status === "degraded" ? "Tillfälligt problem i tjänsten" : "Begäran kunde inte behandlas",
          user_explanation: userMessage,
          recommended_action: "Försök igen om en liten stund eller skicka debug-ID till Codex.",
          error_stage: errorStage,
          user_message: userMessage,
          technical_message: technicalMessage,
          data: null,
          warnings: technicalMessage ? [technicalMessage] : [],
          reasons: ["client_request_failure"],
          reason_details: ["Begäran kunde inte slutföras som förväntat."],
          debug_id: debugId,
        };
      }

      function fileToDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => reject(new Error(`Kunde inte läsa ${file.name}`));
          reader.readAsDataURL(file);
        });
      }

      async function buildImagePayloads() {
        const files = Array.from(imageInput.files);
        const images = await Promise.all(files.map(fileToDataUrl));
        return { files, images };
      }

      async function requestValuation(overrides = {}) {
        const { files, images } = await buildImagePayloads();
        const response = await fetch(getApiUrl(), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            filename: files[0] ? files[0].name : null,
            images,
            brand: overrides.brand || null,
            model: overrides.model || null,
          }),
        });

        if (!response.ok) {
          let payload = null;
          try { payload = await response.json(); } catch { payload = null; }

          if (payload?.status) {
            const error = new Error(payload.user_message || payload.status_message || "Begäran misslyckades");
            error.envelope = payload;
            throw error;
          }

          const detail = payload?.detail;
          const technicalMessage = typeof detail === "string"
            ? detail
            : detail?.message || (payload ? JSON.stringify(payload) : "Inget extra felsvar kunde läsas.");
          const error = new Error(payload?.user_message || detail?.message || "Begäran misslyckades");
          error.envelope = buildClientErrorEnvelope({
            message: error.message,
            technicalMessage,
            debugId: payload?.debug_id || "client_http_failure",
            errorStage: payload?.error_stage || "response_build",
          });
          throw error;
        }

        return response.json();
      }

      function formatValuationMethod(method) {
        if (!method) return "Ej angiven";
        const mapping = {
          relevance_weighted_median_with_robust_outlier_filter: "Median av jämförbara annonser med avvikarfilter",
          relevance_weighted_median_with_robust_outlier_filter_and_new_price_constraint: "Median av jämförbara annonser med avvikarfilter och nypriskontext",
        };
        return mapping[method] || method.replaceAll("_", " ");
      }

      function getSourceNameFromUrl(url) {
        if (!url) return null;
        try { return new URL(url).hostname.replace(/^www\./, ""); } catch { return null; }
      }

      function getDisplaySourceName(source) {
        const mapping = { Tradera: "Tradera", tradera_serpapi: "Tradera", Blocket: "Blocket", blocket_serpapi: "Blocket", "SerpApi Google Shopping": "Google Shopping" };
        return mapping[source] || source || "Marknadsplats";
      }

      function getFallbackMetadata(comparable) { return comparable?.raw?._fallback_metadata || {}; }

      function isAccessoryLikeComparable(comparable) {
        const text = normalizeKey(`${comparable.title || ""} ${comparable.condition_hint || ""}`);
        return ["case","fodral","charger","laddare","cable","kabel","battery","batteri","mount","faste","fäste","strap","remote","cover","housing","adapter"].some(k => text.includes(k));
      }

      function isBundleLikeComparable(comparable) {
        const text = normalizeKey(comparable.title || "");
        return ["combo","bundle","paket","kit","adventure","creator","sandisk","mikrofon","microphone","selfie","selfie stick","battery","batteri","minneskort","micro sd","microsd"].some(k => text.includes(k));
      }

      function getComparableClassification(comparable) {
        if (isAccessoryLikeComparable(comparable)) return "accessories";
        if (isBundleLikeComparable(comparable)) return "bundles";
        const metadata = getFallbackMetadata(comparable);
        const hasFallbackMetadata = Object.keys(metadata).length > 0;
        if (hasFallbackMetadata) {
          const sourceQuality = metadata.source_quality || "";
          const exactnessConfidence = Number(metadata.exactness_confidence || 0);
          if (sourceQuality === "fallback_low_exactness" || exactnessConfidence < 0.65) return "related";
        }
        return "main";
      }

      function getCheapestNewPriceSource(newPrice) {
        const sources = newPrice?.sources || [];
        const pricedSources = sources.map(s => ({ ...s, numericPrice: Number(s?.price) }))
          .filter(s => Number.isFinite(s.numericPrice) && s.numericPrice > 0);
        if (!pricedSources.length) return null;
        return pricedSources.sort((a, b) => a.numericPrice - b.numericPrice)[0];
      }

      function getComparableDisplayPriority(comparable, data) {
        const title = normalizeKey(comparable?.title || "");
        const model = normalizeKey(data?.model || "");
        const line = normalizeKey(data?.line || "");
        const variant = normalizeKey(data?.variant || "");
        const metadata = getFallbackMetadata(comparable);
        const exactnessConfidence = Number(metadata.exactness_confidence || 0);
        const isSold = comparable?.listing_type === "sold" || comparable?.status === "completed";
        let priority = 0;
        if (model && title.includes(model)) priority += 60;
        if (line && title.includes(line)) priority += 18;
        if (variant && title.includes(variant)) priority += 10;
        if (isSold) priority += 16;
        priority += Math.round(exactnessConfidence * 20);
        return priority;
      }

      function collectSourceGroups(data, debugSummary) {
        const groups = { newPriceEntries: [], mainComparableEntries: [], bundleComparableEntries: [], accessoryComparableEntries: [], relatedComparableEntries: [], otherEntries: [], filteredNoise: [] };
        const seen = new Set();
        const newPriceSources = data?.market_data?.new_price?.sources || [];
        const comparables = [...(data?.market_data?.comparables || [])].sort((a, b) => {
          const d = getComparableDisplayPriority(b, data) - getComparableDisplayPriority(a, data);
          return d !== 0 ? d : Number(b?.price || 0) - Number(a?.price || 0);
        });

        [...newPriceSources].sort((a, b) => Number(a?.price || Infinity) - Number(b?.price || Infinity)).slice(0, 4).forEach(source => {
          const key = `${source.source || ""}:${source.url || ""}:${source.price || ""}`;
          if (seen.has(key)) return;
          seen.add(key);
          groups.newPriceEntries.push({ title: source.source || getSourceNameFromUrl(source.url) || "Butik", meta: `${source.price ? formatCurrency(source.price, source.currency || "SEK") : "Pris saknas"} · Nypriskontext`, href: source.url || null });
        });

        comparables.forEach(comparable => {
          const key = `${comparable.source || ""}:${comparable.url || ""}:${comparable.listing_id || ""}`;
          if (seen.has(key)) return;
          seen.add(key);
          const hasBids = String(comparable.raw?.HasBids || "").toLowerCase() === "true" || Number(comparable.raw?.BidCount || 0) > 0;
          const isSoldEntry = comparable.status === "completed" || comparable.listing_type === "sold";
          const statusLabel = isSoldEntry ? "Såld" : hasBids ? "Budgivning" : "Aktiv";
          const entry = { title: comparable.title || comparable.source || "Marknadsplats", meta: `${getDisplaySourceName(comparable.source)} · ${statusLabel} · ${formatCurrency(comparable.price, comparable.currency || "SEK")}`, href: comparable.url || null, price: comparable.price, currency: comparable.currency || "SEK", source: comparable.source, status: comparable.status, listing_type: comparable.listing_type, condition_hint: comparable.condition_hint, ended_at: comparable.ended_at, raw: comparable.raw };
          const cls = getComparableClassification(comparable);
          if (cls === "main") groups.mainComparableEntries.push(entry);
          else if (cls === "bundles") groups.bundleComparableEntries.push(entry);
          else if (cls === "accessories") groups.accessoryComparableEntries.push(entry);
          else groups.relatedComparableEntries.push(entry);
        });

        (data?.sources || []).forEach(source => {
          if (INTERNAL_SOURCES.has(source)) return;
          const key = `fallback:${source}`;
          if (seen.has(key)) return;
          seen.add(key);
          const fallback = sourceLinks[source] || { meta: "Källa", href: null };
          groups.otherEntries.push({ title: source, meta: fallback.meta, href: fallback.href && fallback.href !== "#" ? fallback.href : null });
        });

        [...(debugSummary?.top_rejection_reasons || []), ...(debugSummary?.top_downgrade_reasons || [])].slice(0, 4).forEach(item => groups.filteredNoise.push(item));
        return groups;
      }

      function getNewPriceContext(data, status) {
        const newPrice = data?.market_data?.new_price;
        const sourceCount = Number(newPrice?.source_count || newPrice?.sources?.length || 0);
        const value = newPrice?.estimated_new_price;
        const currency = newPrice?.currency || data?.market_data?.currency || "SEK";
        const cheapestSource = getCheapestNewPriceSource(newPrice);

        if (value === null || value === undefined) {
          if (status === "ambiguous_model" && !data?.market_data) return { value: "Inte hämtat än", meta: "Vi väntar med nypriset tills vi är säkrare på exakt modell." };
          if (status === "degraded") return { value: "Tillfälligt otillgängligt", meta: "Nypriset kunde inte hämtas i det här försöket." };
          if (cheapestSource) return { value: `Från ${formatCurrency(cheapestSource.numericPrice, cheapestSource.currency || currency)}`, meta: sourceCount === 1 ? "En butiksträff ger nypriskontext, men underlaget är för svagt för ett fullt nypris." : `Lägsta butiksträff av ${sourceCount} möjliga nypriskällor.` };
          return { value: "Hittades inte", meta: sourceCount ? `Vi hittade ${sourceCount} butiksträffar, men underlaget var för svagt för ett tryggt nypris.` : "Visas bara när vi hittar trovärdiga butiksträffar." };
        }

        return { value: formatCurrency(value, currency), meta: sourceCount ? `Stödkontext från ${sourceCount} butik${sourceCount === 1 ? "" : "er"}` : "Nypriskontext", numericValue: value, currency };
      }

      function buildUsedValueSummary(envelope) {
        const { status, data, debug_summary: debugSummary } = envelope;
        const valuation = data?.valuation;
        const preliminaryEstimate = data?.preliminary_estimate;
        const fetched = debugSummary?.total_comparables_fetched;
        const relevant = debugSummary?.relevant_comparables_kept;
        const sold = debugSummary?.sold_comparables_kept;

        if (status === "ok" && valuation) return { title: "Uppskattat begagnatvärde", value: formatCurrency(valuation.fair_estimate, valuation.currency), meta: `${formatCurrency(valuation.low_estimate, valuation.currency)} – ${formatCurrency(valuation.high_estimate, valuation.currency)}`, low: valuation.low_estimate, high: valuation.high_estimate, confidence: valuation.confidence, comparableCount: valuation.comparable_count };
        if (status === "ambiguous_model") return { title: "Begagnatvärde", value: "Behöver bättre produktbilder", meta: "Vi väntar med begagnatvärdet tills vi är säkrare på exakt modell." };
        if (status === "insufficient_evidence") {
          if (preliminaryEstimate) return { title: "Grov uppskattning", value: `~ ${formatCurrency(preliminaryEstimate.estimate, preliminaryEstimate.currency)}`, meta: preliminaryEstimate.basis_summary };
          if (fetched && (relevant ?? 0) === 0) return { title: "Begagnatvärde", value: "För svagt marknadsunderlag", meta: `Vi hittade ${fetched} annonser, men ingen var tillräckligt nära rätt modell.` };
          if (fetched && relevant !== null && relevant !== undefined) return { title: "Begagnatvärde", value: "För svagt marknadsunderlag", meta: `Vi hittade ${fetched} annonser, men bara ${relevant} var tillräckligt relevanta${sold !== null && sold !== undefined ? ` och ${sold} var sålda` : ""}.` };
          return { title: "Begagnatvärde", value: "För svagt marknadsunderlag", meta: "Vi visar hellre inget värde än ett missvisande intervall." };
        }
        if (status === "degraded") return { title: "Begagnatvärde", value: "Tillfälligt avbrott", meta: "Det här är ett systemproblem, inte ett värderingsresultat." };
        return { title: "Begagnatvärde", value: "Kunde inte visas", meta: "Försök gärna igen med samma bilder om en liten stund." };
      }

      function getSummaryNote(envelope) {
        const { status, data } = envelope;
        const userTitle = envelope.user_status_title;
        const userExplanation = envelope.user_explanation;
        const recommendedAction = envelope.recommended_action;

        if (status === "ok") return { title: "Vad du ser här", text: data?.valuation?.evidence_summary || "Begagnatvärdet bygger på de mest relevanta andrahandsannonserna vi hittade." };
        if (status === "ambiguous_model") return { title: userTitle || "Vad du kan göra nu", text: [userExplanation, recommendedAction].filter(Boolean).join(" "), tags: data?.requested_additional_angles || [] };
        if (status === "insufficient_evidence") return { title: userTitle || "Varför inget begagnatvärde visas", text: [userExplanation, recommendedAction].filter(Boolean).join(" ") };
        if (status === "degraded") return { title: userTitle || "Vad du kan göra nu", text: [userExplanation, recommendedAction].filter(Boolean).join(" ") };
        return { title: userTitle || "Vad du kan göra nu", text: [userExplanation, recommendedAction].filter(Boolean).join(" ") };
      }

      function getComparableSnapshot(data) {
        const comparables = data?.market_data?.comparables || [];
        const snapshot = { total: comparables.length, sold: 0, active: 0, bidding: 0, accessoryLike: 0, bundleLike: 0 };
        comparables.forEach(c => {
          if (c.listing_type === "sold" || c.status === "completed") snapshot.sold += 1; else snapshot.active += 1;
          if (String(c.raw?.HasBids || "").toLowerCase() === "true" || Number(c.raw?.BidCount || 0) > 0) snapshot.bidding += 1;
          if (isAccessoryLikeComparable(c)) snapshot.accessoryLike += 1;
          if (isBundleLikeComparable(c)) snapshot.bundleLike += 1;
        });
        return snapshot;
      }

      function isDevelopmentMode() {
        const params = new URLSearchParams(window.location.search);
        const host = window.location.hostname;
        return params.get("dev") === "1" || window.location.protocol === "file:" || host === "localhost" || host === "127.0.0.1";
      }

      async function copyTextToClipboard(text) {
        if (!text) throw new Error("Inget innehåll att kopiera.");
        if (navigator.clipboard?.writeText) { await navigator.clipboard.writeText(text); return; }
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.setAttribute("readonly", "readonly");
        textarea.style.position = "absolute";
        textarea.style.left = "-9999px";
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        document.body.removeChild(textarea);
      }

      // ─── UI Helpers ───
      function el(tag, cls, text) {
        const e = document.createElement(tag);
        if (cls) e.className = cls;
        if (text !== undefined) e.textContent = text;
        return e;
      }

      function sectionHeader(text) {
        return el("div", "section-header", text);
      }

        const card = el("div", "dev-card");
        card.appendChild(el("strong", null, label));

      }

          technicalPanel.appendChild(tGrid);
          if (envelope.technical_message) technicalPanel.appendChild(el("div", "dev-panel-copy", envelope.technical_message));
        }

        if (devError.suggested_investigation) technicalPanel.appendChild(el("div", "dev-panel-copy", `Trolig första kontroll: ${devError.suggested_investigation}`));

        if (devError.relevant_filenames?.length) {
          technicalPanel.appendChild(el("div", "dev-section-title", "Troliga filer att börja med"));
          const list = el("ul", "dev-list");

      function makeDebugSummarySection(envelope) {
        const debugSummary = envelope.debug_summary;
        if (!debugSummary) return null;

        const { market_lookup_attempted: mla, total_comparables_fetched: totalFetched, relevant_comparables_kept: relevantKept, sold_comparables_kept: soldKept, average_relevance: avgRelevance, status_reasons: statusReasons, top_rejection_reasons: topRejectionReasons, top_downgrade_reasons: topDowngradeReasons } = debugSummary;

        const hasMetrics = totalFetched !== null || relevantKept !== null || soldKept !== null || avgRelevance !== null;
        const hasReasons = (statusReasons || []).length || (topRejectionReasons || []).length || (topDowngradeReasons || []).length;
        if (!hasMetrics && !hasReasons) return null;

        const details = document.createElement("details");

        summary.appendChild(titleSpan);
        summary.appendChild(metaSpan);
        details.appendChild(summary);

        const content = el("div", "collapsible-content");
        content.appendChild(el("div", "dev-panel-copy", mla ? "Det här visar kort vad som hämtades och varför vissa annonser vägde mindre eller försvann." : "Marknadsannonser hämtades inte ännu eftersom den exakta modellen inte var tillräckligt säker."));

        if (hasMetrics) {

          if (soldKept !== null && soldKept !== undefined) grid.appendChild(makeDevCard("Sålda kvar", String(soldKept)));
          if (avgRelevance !== null && avgRelevance !== undefined) grid.appendChild(makeDevCard("Snittrelevans", String(avgRelevance)));

        [["Statusorsaker", statusReasons], ["Vanliga bortfall", topRejectionReasons], ["Vanliga nedjusteringar", topDowngradeReasons]].forEach(([title, items]) => {

      }

      // ─── Build dot plot SVG ───
      function buildDotPlot(comparables, estimateValue) {
        const prices = comparables.map(c => Number(c.price || c.numericPrice)).filter(p => Number.isFinite(p) && p > 0);
        if (prices.length < 3) return null;

        prices.sort((a, b) => a - b);
        const minP = prices[0];
        const maxP = prices[prices.length - 1];
        const range = maxP - minP || 1;

        const q1 = prices[Math.floor(prices.length * 0.25)];
        const q3 = prices[Math.floor(prices.length * 0.75)];

        const W = 280, H = 48;
        const PAD = 10;
        const plotW = W - PAD * 2;

        function xFor(p) { return PAD + ((p - minP) / range) * plotW; }

        const svgNS = "http://www.w3.org/2000/svg";
        const svg = document.createElementNS(svgNS, "svg");
        svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
        svg.setAttribute("width", "100%");
        svg.setAttribute("preserveAspectRatio", "none");
        svg.style.display = "block";

        // base line
        const line = document.createElementNS(svgNS, "rect");
        line.setAttribute("x", PAD); line.setAttribute("y", H / 2 - 1.5);
        line.setAttribute("width", plotW); line.setAttribute("height", 3);
        line.setAttribute("rx", "1.5"); line.setAttribute("fill", "#D5D0C5");
        svg.appendChild(line);

        // IQR band
        const iqrX = xFor(q1);
        const iqrW = xFor(q3) - iqrX;
        if (iqrW > 0) {
          const band = document.createElementNS(svgNS, "rect");
          band.setAttribute("x", iqrX); band.setAttribute("y", H / 2 - 5);
          band.setAttribute("width", iqrW); band.setAttribute("height", 10);
          band.setAttribute("rx", "3"); band.setAttribute("fill", "#B0AA9E");
          svg.appendChild(band);
        }

        // dots
        prices.forEach(p => {
          const dot = document.createElementNS(svgNS, "circle");
          dot.setAttribute("cx", xFor(p)); dot.setAttribute("cy", H / 2);
          dot.setAttribute("r", 4);
          const inIQR = p >= q1 && p <= q3;
          dot.setAttribute("fill", inIQR ? "#5C5850" : "#B0AA9E");
          svg.appendChild(dot);
        });

        // estimate marker
        if (estimateValue !== null && estimateValue !== undefined) {
          const ex = xFor(Number(estimateValue));
          const markerLine = document.createElementNS(svgNS, "rect");
          markerLine.setAttribute("x", ex - 1.5); markerLine.setAttribute("y", 4);
          markerLine.setAttribute("width", 3); markerLine.setAttribute("height", H - 8);
          markerLine.setAttribute("rx", "1.5"); markerLine.setAttribute("fill", "#2C2A25");
          svg.appendChild(markerLine);
        }

        return svg;
      }

      // ─── Render ok result (Quick View + Advanced) ───
      function renderOkResult(envelope) {

          envelope.status === "depreciation_estimate" ? "Uppskattat värde (avskrivning)" : "Begagnat marknadsvärde"
        ));

        // Combined info line: range · confidence · sources

        // ── Value retention bar ──

            sub.appendChild(document.createTextNode(subParts.join(" · ")));
            if (entry.condition_hint) {
