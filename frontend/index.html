            row.appendChild(left);
            const right = el("div", "quick-comparable-price", formatCurrency(entry.price, entry.currency));
            if (entry.href) {
              const linkIcon = el("span", "quick-comparable-link");
              linkIcon.innerHTML = `<i data-lucide="external-link" style="width:12px;height:12px;stroke-width:1.5;color:var(--text-muted)"></i>`;
              right.appendChild(linkIcon);
            }
            row.appendChild(right);
            compList.appendChild(row);
          });
          compWrap.appendChild(compList);
          if (allMainComparables.length > MAX_QUICK) {
            const more = el("button", "show-all-link", `Visa alla ${allMainComparables.length} annonser`);
            more.addEventListener("click", () => { advancedOpen = true; advancedView.classList.add("open"); detailsBtn.textContent = "Dölj detaljer"; more.closest(".quick-comparables-wrap")?.remove(); });
            compWrap.appendChild(more);
          }
          wrap.appendChild(compWrap);
        }

        // ── Actions ──
        const actionsRow = el("div", "actions-row");

        const scanNewBtn = el("button", "btn-primary", "Scanna ny");
        scanNewBtn.style.marginTop = "0";
        scanNewBtn.addEventListener("click", resetToUpload);

        const detailsBtn = el("button", "btn-secondary");
        detailsBtn.textContent = advancedOpen ? "Dölj detaljer" : "Se detaljer";
        detailsBtn.addEventListener("click", () => {
          advancedOpen = !advancedOpen;
          advancedView.classList.toggle("open", advancedOpen);
          detailsBtn.textContent = advancedOpen ? "Dölj detaljer" : "Se detaljer";
        });

        actionsRow.appendChild(scanNewBtn);
        actionsRow.appendChild(detailsBtn);
        wrap.appendChild(actionsRow);

        // ── Quick links ──
        const ql = el("div", "quick-links");
        const traderaLink = el("a", "quick-link", "Sälj på Tradera");
        traderaLink.href = "https://www.tradera.com/";
        traderaLink.target = "_blank";
        traderaLink.rel = "noreferrer";
        traderaLink.style.textDecoration = "underline";
        const shareBtn = el("button", "quick-link", "Dela estimat");
        shareBtn.addEventListener("click", () => {
          const text = `${getDetectedProductName(data) || "Produkt"} — begagnatvärde ${usedValue.value} (via Värdekoll)`;
          if (navigator.share) { navigator.share({ title: "Värdekoll", text }); }
          else { copyTextToClipboard(text); }
        });
        ql.appendChild(traderaLink);
        ql.appendChild(shareBtn);
        wrap.appendChild(ql);

        // ── Timestamp ──
        const ts = el("div", "result-timestamp", `Estimerat ${new Date().toLocaleDateString("sv-SE", { day: "numeric", month: "long", year: "numeric" })}`);
        wrap.appendChild(ts);

        // ── Advanced View ──
        const advancedView = el("div", "advanced-view");
        if (advancedOpen) advancedView.classList.add("open");
        const advancedInner = el("div", "advanced-inner");

        // Source chips
        const sourcesByName = {};
        allMainComparables.forEach(c => {
          const name = getDisplaySourceName(c.source);
          sourcesByName[name] = (sourcesByName[name] || 0) + 1;
        });
        if (Object.keys(sourcesByName).length) {
          const srcSection = el("div", "adv-section");
          srcSection.appendChild(sectionHeader("Källor"));
          const chips = el("div", "source-chips");
          Object.entries(sourcesByName).forEach(([name, count]) => {
            const chip = el("div", "source-chip", `${name}: ${count}`);
            chips.appendChild(chip);
          });
          // add new price sources
          (data?.market_data?.new_price?.sources || []).slice(0, 2).forEach(s => {
            const name = s.source || getSourceNameFromUrl(s.url) || "Butik";
            const chip = el("div", "source-chip", `${name} (nypris)`);
            chips.appendChild(chip);
          });
          srcSection.appendChild(chips);
          advancedInner.appendChild(srcSection);

          // Nyprisjämförelse: individual sources sorted by price
          const npSources = (data?.market_data?.new_price?.sources || [])
            .filter(s => s.price > 0)
            .sort((a, b) => a.price - b.price);
          const cseComp = data?.market_data?.new_price?.cse_comparison;
          if (npSources.length > 0 || cseComp?.estimated_new_price) {
            const npSection = el("div", "adv-section");
            npSection.appendChild(sectionHeader("Nyprisjämförelse"));
            const npList = el("div", "found-data-list");
            npSources.forEach((s, i) => {
              const row = el("div", "found-data-row");
              const nameWrap = el("span", null, "");
              const storeName = s.source || "Butik";
              nameWrap.textContent = storeName;
              if (i === 0 && npSources.length > 1) {
                const badge = el("span", "lowest-price-badge", "Lägst");
                nameWrap.appendChild(badge);
              }
              row.appendChild(nameWrap);
              const priceEl = el("span", i === 0 ? "new-price-highlight" : null,
                formatCurrency(s.price, s.currency || data.market_data.new_price.currency));
              row.appendChild(priceEl);
              npList.appendChild(row);
            });
            // Compare price links
            const modelName = data?.model || data?.data?.model || "";
            if (modelName) {
              const linksWrap = el("div", "compare-links-wrap");
              const prisjaktLink = document.createElement("a");
              prisjaktLink.href = `https://www.prisjakt.nu/search?search=${encodeURIComponent(modelName)}`;
              prisjaktLink.target = "_blank";
              prisjaktLink.rel = "noopener noreferrer";
              prisjaktLink.className = "compare-prices-link";
              prisjaktLink.textContent = "Prisjakt \u2197";
              linksWrap.appendChild(prisjaktLink);

              const googleLink = document.createElement("a");
              googleLink.href = `https://www.google.se/search?tbm=shop&q=${encodeURIComponent(modelName)}`;
              googleLink.target = "_blank";
              googleLink.rel = "noopener noreferrer";
              googleLink.className = "compare-prices-link";
              googleLink.textContent = "Google Shopping \u2197";
              linksWrap.appendChild(googleLink);

              npList.appendChild(linksWrap);
            }
            if (cseComp?.estimated_new_price) {
              const row = el("div", "found-data-row");
              row.appendChild(el("span", null, "Google CSE"));
              row.appendChild(el("span", null, formatCurrency(cseComp.estimated_new_price, cseComp.currency)));
              npList.appendChild(row);
            }
            npSection.appendChild(npList);
            advancedInner.appendChild(npSection);
          }
        }

        // Price distribution dot plot
        const allPriceComparables = [...(data?.market_data?.comparables || [])].filter(c => Number.isFinite(Number(c.price)) && Number(c.price) > 0);
        if (allPriceComparables.length >= 3) {
          const plotSection = el("div", "adv-section");
          plotSection.appendChild(sectionHeader("Prisfördelning"));
          const plotWrap = el("div", "dot-plot-wrap");
          const svg = buildDotPlot(allPriceComparables, fairEstimate);
          if (svg) {
            plotWrap.appendChild(svg);
            const axis = el("div", "dot-plot-axis");
            const prices = allPriceComparables.map(c => Number(c.price)).filter(Number.isFinite).sort((a,b) => a-b);
            axis.appendChild(el("span", "text-xs text-muted", formatCurrency(prices[0])));
            axis.appendChild(el("span", "text-xs text-muted", formatCurrency(prices[prices.length - 1])));
            plotWrap.appendChild(axis);
          }
          plotSection.appendChild(plotWrap);
          advancedInner.appendChild(plotSection);
        }

        // Comparable listings
        if (allMainComparables.length > 0) {
          const compSection = el("div", "adv-section");
          compSection.appendChild(sectionHeader("Senaste försäljningar"));
          const list = el("div", "comparables-list");
          const MAX_SHOWN = 5;
          const toShow = showAllComparables ? allMainComparables : allMainComparables.slice(0, MAX_SHOWN);
          toShow.forEach(entry => {
            const row = el("div", "comparable-row");
            if (entry.href) { row.style.cursor = "pointer"; row.addEventListener("click", () => window.open(entry.href, "_blank", "noreferrer")); }
            const body = el("div", "comparable-body");
            body.appendChild(el("div", "comparable-title", entry.title));
            const meta = el("div", "comparable-meta");
            meta.appendChild(document.createTextNode(`${getDisplaySourceName(entry.source)} · ${(entry.status === "completed" || entry.listing_type === "sold") ? "Såld" : "Aktiv"}`));
            if (entry.condition_hint) {
              const tag = el("span", "condition-tag", entry.condition_hint);
              meta.appendChild(tag);
            }
            body.appendChild(meta);
            row.appendChild(body);
            row.appendChild(el("div", "comparable-price", formatCurrency(entry.price, entry.currency)));
            list.appendChild(row);
          });
          compSection.appendChild(list);
          if (!showAllComparables && allMainComparables.length > MAX_SHOWN) {
            const showAllBtn = el("button", "show-all-link", `Visa alla ${allMainComparables.length} objekt`);
            showAllBtn.addEventListener("click", () => { showAllComparables = true; renderResult(lastEnvelope); });
            compSection.appendChild(showAllBtn);
          }
          advancedInner.appendChild(compSection);
        }

        // Reasoning
        if (data?.valuation?.evidence_summary) {
          const reasonSection = el("div", "adv-section");
          reasonSection.appendChild(sectionHeader("Så räknade vi"));
          const block = el("div", "reasoning-block", data.valuation.evidence_summary);
          reasonSection.appendChild(block);
          advancedInner.appendChild(reasonSection);
        }

        // Feedback
        {
          const fbSection = el("div", "adv-section");
          const fbBlock = el("div", "feedback-block");
          fbBlock.appendChild(el("div", "feedback-label", "Identifierade vi rätt produkt?"));
          const fbBtns = el("div", "feedback-btns");
          const yesBtn = el("button", "feedback-btn", "Ja, stämmer");
          const noBtn  = el("button", "feedback-btn", "Nej, fel modell");
          yesBtn.addEventListener("click", () => { yesBtn.classList.add("selected-yes"); noBtn.classList.remove("selected-no"); });
          noBtn.addEventListener("click",  () => { noBtn.classList.add("selected-no");  yesBtn.classList.remove("selected-yes"); openCorrectionSheet(data); });
          fbBtns.appendChild(yesBtn);
          fbBtns.appendChild(noBtn);
          fbBlock.appendChild(fbBtns);
          fbSection.appendChild(fbBlock);
          advancedInner.appendChild(fbSection);
        }

        // Next steps
        {
          const nsSection = el("div", "adv-section");
          nsSection.appendChild(sectionHeader("Nästa steg"));
          const nsList = el("div", "next-steps-list");
          [
            { label: "Sälj på Tradera", href: "https://www.tradera.com/" },
            { label: "Lägg upp på Blocket", href: "https://www.blocket.se/" },
            { label: "Dela estimat", action: () => { const text = `${getDetectedProductName(data) || "Produkt"} — begagnatvärde ${usedValue.value}`; if (navigator.share) navigator.share({ title: "Värdekoll", text }); else copyTextToClipboard(text); } },
          ].forEach(item => {
            const row = item.href ? document.createElement("a") : el("button", null);
            row.className = "next-step-row";
            if (item.href) { row.href = item.href; row.target = "_blank"; row.rel = "noreferrer"; }
            if (item.action) { row.addEventListener("click", item.action); row.style.width = "100%"; row.style.textAlign = "left"; row.style.background = "none"; row.style.border = "none"; row.style.fontFamily = "inherit"; row.style.cursor = "pointer"; }
            row.appendChild(document.createTextNode(item.label));
            const arrow = el("span", null);
            arrow.innerHTML = `<i data-lucide="chevron-right" style="width:16px;height:16px;stroke-width:1.5;color:var(--text-muted)"></i>`;
            row.appendChild(arrow);
            nsList.appendChild(row);
          });
          nsSection.appendChild(nsList);
          advancedInner.appendChild(nsSection);
        }

        // Debug summary (dev mode)
        const debugSection = makeDebugSummarySection(envelope);
        if (debugSection) advancedInner.appendChild(debugSection);

        // Debug ID
        if (envelope.debug_id) {
          advancedInner.appendChild(el("div", "debug-id-line", `Debug ID: ${envelope.debug_id}`));
        }

        advancedView.appendChild(advancedInner);
        wrap.appendChild(advancedView);

        return wrap;
      }

      // ─── Render ambiguous state ───
      function renderAmbiguousResult(envelope) {
        const { data } = envelope;
        const wrap = el("div", "ambiguous-screen");

        // Photo
        if (currentPhotoUrl) {
          const photoWrap = el("div", "state-photo-wrap");
          const photo = document.createElement("img");
          photo.className = "state-photo";
          photo.src = currentPhotoUrl;
          photo.alt = "Din bild";
          photoWrap.appendChild(photo);
          const badge = el("div", "state-photo-badge", "Otydlig bild");
          photoWrap.appendChild(badge);
          wrap.appendChild(photoWrap);
        }

        // Heading
        const heading = el("div");
        heading.appendChild(sectionHeader("Möjlig matchning"));
        const title = el("div", null);
        title.style.cssText = "font-size:1.25rem;font-weight:700;color:var(--text-primary);margin-bottom:6px";
        title.textContent = getDetectedProductName(data) || "Produktfamilj";
        heading.appendChild(title);
        const explanation = el("div", null);
        explanation.style.cssText = "font-size:0.875rem;color:var(--text-secondary);line-height:1.6";
        explanation.textContent = envelope.user_explanation || "Vi behöver säkrare modellträff för att ge ett korrekt estimat.";
        heading.appendChild(explanation);
        wrap.appendChild(heading);

        // Extra angles upload
        const angles = data?.requested_additional_angles || [];
        const anglesBlock = el("div", "extra-angles-block");
        anglesBlock.appendChild(el("div", "extra-angles-label", "Lägg till fler bilder för bättre estimat"));
        const slots = el("div", "angle-slots");
        const labels = angles.length ? angles.slice(0, 3) : ["Sidan", "Modellnr.", "Etikett"];
        labels.forEach(label => {
          const slot = el("div", "angle-slot");
          const inp = document.createElement("input");
          inp.type = "file"; inp.accept = "image/*";
          inp.addEventListener("change", e => {
            const f = e.target.files[0];
            if (f) {
              // Add to main file input (conceptually)
              slot.style.background = "var(--bg-surface)";
            }
          });
          slot.appendChild(inp);
          // XSS fix: use createElement instead of innerHTML += (which also destroyed the input child)
          const camIcon = document.createElement("i");
          camIcon.setAttribute("data-lucide", "camera");
          camIcon.style.cssText = "width:16px;height:16px;stroke-width:1.5;color:var(--text-faint)";
          slot.appendChild(camIcon);
          slot.appendChild(el("div", "angle-slot-label", label));
          slots.appendChild(slot);
        });
        anglesBlock.appendChild(slots);
        wrap.appendChild(anglesBlock);

        // CTA
        const cta = el("button", "btn-primary", "Ta fler bilder");
        cta.style.marginTop = "0";
        cta.addEventListener("click", () => imageInput.click());
        wrap.appendChild(cta);

        // Manual correction
        const escapeLink = el("button", "quick-link", "Visa ungefärligt estimat ändå");
        escapeLink.style.display = "block";
        escapeLink.style.textAlign = "center";
        escapeLink.style.marginTop = "12px";
        escapeLink.addEventListener("click", () => openCorrectionSheet(data));
        wrap.appendChild(escapeLink);

        // Dev debug
        const devPanel = makeDevErrorPanel(envelope);
        if (devPanel) wrap.appendChild(devPanel);
        const debugSection = makeDebugSummarySection(envelope);
        if (debugSection) wrap.appendChild(debugSection);

        return wrap;
      }

      // ─── Render insufficient evidence state ───
      function renderInsufficientResult(envelope) {
        const { data, debug_summary: debugSummary } = envelope;
        const wrap = el("div", "insufficient-screen");

        // Photo + badge
        if (currentPhotoUrl) {
          const photoWrap = el("div", "state-photo-wrap");
          const photo = document.createElement("img");
          photo.className = "state-photo"; photo.src = currentPhotoUrl; photo.alt = "Din bild";
          photoWrap.appendChild(photo);
          wrap.appendChild(photoWrap);
        }

        // Empty state heading
        const headingWrap = el("div");
        headingWrap.style.textAlign = "center";
        const iconWrap = el("div", "empty-state-icon");
        iconWrap.style.margin = "0 auto 12px";
        iconWrap.innerHTML = `<i data-lucide="info" style="width:24px;height:24px;stroke-width:1.5;color:var(--text-muted)"></i>`;
        headingWrap.appendChild(iconWrap);
        const t = el("div", null, "Inte tillräckligt med data");
        t.style.cssText = "font-size:1.25rem;font-weight:700;color:var(--text-primary);margin-bottom:8px";
        headingWrap.appendChild(t);
        const sub = el("div", null, envelope.user_explanation || "Vi hittade produkten men underlaget är för svagt för ett trovärdigt estimat.");
        sub.style.cssText = "font-size:0.875rem;color:var(--text-secondary);line-height:1.6";
        headingWrap.appendChild(sub);
        wrap.appendChild(headingWrap);

        // What we found
        const sourceGroups = collectSourceGroups(data, debugSummary);
        const totalFound = sourceGroups.mainComparableEntries.length + sourceGroups.relatedComparableEntries.length;
        if (totalFound > 0 || data?.market_data?.new_price) {
          const foundSection = el("div", "adv-section");
          foundSection.appendChild(sectionHeader("Det vi hittade"));
          const foundList = el("div", "found-data-list");

          if (data?.market_data?.new_price?.estimated_new_price) {
            const row = el("div", "found-data-row");
            const hasCseComp = data?.market_data?.new_price?.cse_comparison;
            row.appendChild(el("span", null, hasCseComp ? "Nypris (Serper)" : "Nypris"));
            row.appendChild(el("span", null, formatCurrency(data.market_data.new_price.estimated_new_price, data.market_data.new_price.currency)));
            foundList.appendChild(row);
          }
          const insuffCse = data?.market_data?.new_price?.cse_comparison;
          if (insuffCse?.estimated_new_price) {
            const row = el("div", "found-data-row");
            row.appendChild(el("span", null, "Nypris (CSE)"));
            row.appendChild(el("span", null, formatCurrency(insuffCse.estimated_new_price, insuffCse.currency)));
            foundList.appendChild(row);
          }

          if (debugSummary?.total_comparables_fetched) {
            const row = el("div", "found-data-row");
            row.appendChild(el("span", null, "Annonser hittade"));
            row.appendChild(el("span", null, String(debugSummary.total_comparables_fetched)));
            foundList.appendChild(row);
          }

          if (totalFound > 0) {
            const row = el("div", "found-data-row");
            row.appendChild(el("span", null, "Relevanta träffar"));
            row.appendChild(el("span", null, String(totalFound)));
            foundList.appendChild(row);
          }

          foundSection.appendChild(foundList);
          wrap.appendChild(foundSection);
        }

        // Comparable listing cards
        const allMainComparables = sourceGroups.mainComparableEntries;
        if (allMainComparables.length > 0) {
          const compWrap = el("div", "quick-comparables-wrap");
          const compHeader = el("div", "quick-comparables-header");
          compHeader.appendChild(el("span", "quick-comparables-title", "Annonser vi hittade"));
          compHeader.appendChild(el("span", "quick-comparables-hint", "Sorterat efter relevans"));
          compWrap.appendChild(compHeader);
          const compList = el("div", "quick-comparables-list");
          allMainComparables.slice(0, 5).forEach(entry => {
            const row = el("div", "quick-comparable-row");
            if (entry.href) { row.style.cursor = "pointer"; row.addEventListener("click", () => window.open(entry.href, "_blank", "noreferrer")); }
            const left = el("div", "quick-comparable-left");
            left.appendChild(el("div", "quick-comparable-title", entry.title));
            const sub = el("div", "quick-comparable-sub");
            const isSold = entry.status === "completed" || entry.listing_type === "sold";
            const timeAgo = formatTimeAgo(entry.ended_at);
            const subParts = [getDisplaySourceName(entry.source), isSold ? "Såld" : "Aktiv", timeAgo].filter(Boolean);
            sub.appendChild(document.createTextNode(subParts.join(" · ")));
            if (entry.condition_hint) { const tag = el("span", "condition-tag", entry.condition_hint); tag.style.marginLeft = "4px"; sub.appendChild(tag); }
            left.appendChild(sub);
            row.appendChild(left);
            const right = el("div", "quick-comparable-price", formatCurrency(entry.price, entry.currency));
            if (entry.href) { const linkIcon = el("span", "quick-comparable-link"); linkIcon.innerHTML = `<i data-lucide="external-link" style="width:12px;height:12px;stroke-width:1.5;color:var(--text-muted)"></i>`; right.appendChild(linkIcon); }
            row.appendChild(right);
            compList.appendChild(row);
          });
          compWrap.appendChild(compList);
          wrap.appendChild(compWrap);
        }

        // Suggestion
        if (envelope.recommended_action) {
          const block = el("div", "blockquote-note", envelope.recommended_action);
          wrap.appendChild(block);
        }

        // CTAs
        const cta = el("button", "btn-primary", "Värdera en annan produkt");
        cta.style.marginTop = "0";
        cta.addEventListener("click", resetToUpload);
        wrap.appendChild(cta);

        const escLink = el("button", "quick-link", "Visa grov uppskattning ändå");
        escLink.style.display = "block"; escLink.style.textAlign = "center"; escLink.style.marginTop = "12px";
        escLink.addEventListener("click", () => openCorrectionSheet(data));
        wrap.appendChild(escLink);

        // Dev
        const devPanel = makeDevErrorPanel(envelope);
        if (devPanel) wrap.appendChild(devPanel);
        const debugSection = makeDebugSummarySection(envelope);
        if (debugSection) wrap.appendChild(debugSection);

        return wrap;
      }

      // ─── Render degraded/error state ───
      function renderErrorResult(envelope) {
        const wrap = el("div", "error-screen");

        const iconWrap = el("div", "empty-state-icon");
        iconWrap.innerHTML = `<i data-lucide="alert-circle" style="width:24px;height:24px;stroke-width:1.5;color:var(--accent-danger)"></i>`;
        wrap.appendChild(iconWrap);

        const t = el("div", null, envelope.status === "degraded" ? "Tillfälligt problem med marknadsdatan" : "Något gick fel");
        t.style.cssText = "font-size:1.125rem;font-weight:700;color:var(--text-primary)";
        wrap.appendChild(t);

        const sub = el("div", null, envelope.user_explanation || envelope.status_message || "Försök igen om en liten stund.");
        sub.style.cssText = "font-size:0.875rem;color:var(--text-secondary);line-height:1.6;max-width:36ch";
        wrap.appendChild(sub);

        const retryBtn = el("button", "btn-primary", "Försök igen");
        retryBtn.style.maxWidth = "240px";
        retryBtn.addEventListener("click", () => { resetToUpload(); });
        wrap.appendChild(retryBtn);

        // Dev
        const devPanel = makeDevErrorPanel(envelope);
        if (devPanel) { wrap.style.textAlign = "left"; wrap.appendChild(devPanel); }

        if (envelope.debug_id && !devPanel) {
          wrap.appendChild(el("div", "debug-id-line", `Debug ID: ${envelope.debug_id}`));
        }

        const debugSection = makeDebugSummarySection(envelope);
        if (debugSection) wrap.appendChild(debugSection);

        return wrap;
      }

      // ─── Master render ───
      function renderResult(envelope) {
        lastEnvelope = envelope;
        const { status } = envelope;

        resultScreen.innerHTML = "";
        resultScreen.classList.remove("hidden");
        uploadScreen.classList.add("hidden");
        scanningScreen.classList.add("hidden");

        // Show confirmation step for ok/depreciation results
        if ((status === "ok" || status === "depreciation_estimate") && envelope.data) {
          const name = getDetectedProductName(envelope.data) || "Okänd produkt";
          const conf = el("div", "section-card");
          conf.style.cssText = "text-align:center;padding:32px 20px;";

          if (currentPhotoUrl) {
            const img = document.createElement("img");
            img.src = currentPhotoUrl;
            img.alt = "Produktbild";
            img.style.cssText = "width:80px;height:80px;object-fit:cover;border-radius:12px;margin-bottom:16px;";
            conf.appendChild(img);
          }

          conf.appendChild(el("div", "product-sub", "Vi identifierade:"));
          const nameEl = el("div", "product-name", name);
          nameEl.style.cssText = "font-size:1.25rem;margin:8px 0 4px;";
          conf.appendChild(nameEl);

          const parts = [envelope.data.category, envelope.data.brand].filter(Boolean);
          conf.appendChild(el("div", "product-sub", parts.join(" · ")));

          const q = el("div", "", "Stämmer detta?");
          q.style.cssText = "margin-top:20px;font-size:0.9375rem;color:var(--text-secondary);";
          conf.appendChild(q);

          const btnRow = el("div", "");
          btnRow.style.cssText = "display:flex;gap:12px;margin-top:16px;justify-content:center;";
          const yesBtn = el("button", "btn-primary", "Ja, visa värdering");
          yesBtn.style.cssText += ";flex:1;max-width:200px;";
          yesBtn.addEventListener("click", () => _showFinalResult(envelope));
          const noBtn = el("button", "btn-secondary", "Nej, rätta");
          noBtn.style.cssText = "flex:1;max-width:200px;padding:12px;border-radius:12px;border:1px solid var(--border-medium);background:transparent;cursor:pointer;font-size:0.9375rem;";
          noBtn.addEventListener("click", () => openCorrectionSheet(envelope.data));
          btnRow.appendChild(yesBtn);
          btnRow.appendChild(noBtn);
          conf.appendChild(btnRow);

          resultScreen.appendChild(conf);
          lucide.createIcons();
          return;
        }

        _showFinalResult(envelope);
      }

      function _showFinalResult(envelope) {
        const { status } = envelope;
        resultScreen.innerHTML = "";

        let content;
        if ((status === "ok" || status === "depreciation_estimate") && envelope.data?.valuation) {
          content = renderOkResult(envelope);
        } else if (status === "ambiguous_model" && envelope.data) {
          content = renderAmbiguousResult(envelope);
        } else if (status === "insufficient_evidence" && envelope.data) {
          content = renderInsufficientResult(envelope);
        } else if (status === "degraded") {
          content = renderErrorResult(envelope);
        } else {
          content = renderErrorResult(envelope);
        }

        resultScreen.appendChild(content);
        lucide.createIcons();
      }

      // ─── Scanning UI helpers ───
      function markStepDone(n, text, subText) {
        const circle = document.getElementById(`step${n}Circle`);
        const title  = document.getElementById(`step${n}Title`);
        const sub    = document.getElementById(`step${n}Sub`);
        circle.className = "step-circle done";
        circle.innerHTML = `<i data-lucide="check" style="width:14px;height:14px;stroke-width:2.5;color:#F7F5F0"></i>`;
        title.className = "step-title";
        title.textContent = text;
        if (sub && subText) { sub.classList.remove("hidden"); sub.textContent = subText; }
        lucide.createIcons();
      }

      function markStepActive(n, text) {
        const circle = document.getElementById(`step${n}Circle`);
        const title  = document.getElementById(`step${n}Title`);
        circle.className = "step-circle active";
        circle.innerHTML = `<div class="dot"></div>`;
        title.className = "step-title";
        title.textContent = text;
      }

      function showScanningScreen() {
        uploadScreen.classList.add("hidden");
        resultScreen.classList.add("hidden");
        scanningScreen.classList.remove("hidden");

        // Reset steps
        ["step1","step2","step3"].forEach((id, i) => {
          const circle = document.getElementById(`${id}Circle`);
          const title  = document.getElementById(`${id}Title`);
          const sub    = document.getElementById(`${id}Sub`);
          if (i === 0) { circle.className = "step-circle active"; circle.innerHTML = `<div class="dot"></div>`; title.className = "step-title"; title.textContent = "Identifierar produkt..."; }
          else { circle.className = "step-circle waiting"; circle.innerHTML = ""; title.className = "step-title muted"; title.textContent = i === 1 ? "Söker marknadspriser..." : "Beräknar estimat"; }
          if (sub) sub.classList.add("hidden");
        });

        // Show the user's photo
        if (currentPhotoUrl) scanPhoto.src = currentPhotoUrl;
      }

      // ─── Reset to upload ───
      function resetToUpload() {
        uploadScreen.classList.remove("hidden");
        scanningScreen.classList.add("hidden");
        resultScreen.classList.add("hidden");
        resultScreen.innerHTML = "";
        previewRow.innerHTML = "";
        previewRow.classList.add("hidden");
        analyzeButton.style.display = "none";
        imageInput.value = "";
        currentPhotoUrl = null;
        lastEnvelope = null;
        showAllComparables = false;
        advancedOpen = false;
        lucide.createIcons();
      }

      // ─── Correction sheet ───
      function openCorrectionSheet(data) {
        brandField.value = data?.brand || "";
        modelField.value = data?.model || "";
        const sub = document.getElementById("sheetSub");
        const name = getDetectedProductName(data);
        if (sub && name) sub.textContent = `Vi identifierade: ${name}`;
        correctionOverlay.classList.remove("hidden");
      }

      function closeCorrectionSheet() {
        correctionOverlay.classList.add("hidden");
      }

      correctionCancel.addEventListener("click", closeCorrectionSheet);
      correctionOverlay.addEventListener("click", e => { if (e.target === correctionOverlay) closeCorrectionSheet(); });

      correctionSubmit.addEventListener("click", async () => {
        try {
          correctionSubmit.disabled = true;
          closeCorrectionSheet();
          showScanningScreen();
          markStepActive(1, "Identifierar produkt...");

          const updated = await requestValuation({
            brand: brandField.value.trim(),
            model: modelField.value.trim(),
          });

          renderResult(updated);
        } catch (error) {
          renderResult(error.envelope || buildClientErrorEnvelope({ message: error.message, technicalMessage: error?.stack || null }));
        } finally {
          correctionSubmit.disabled = false;
        }
      });

      // ─── Image input & preview ───
      imageInput.addEventListener("change", () => {
        const files = Array.from(imageInput.files);
        if (!files.length) return;

        previewRow.innerHTML = "";
        files.forEach((file, idx) => {
          const url = URL.createObjectURL(file);
          if (idx === 0) currentPhotoUrl = url;
          const item = el("div", "thumb-item");
          const img  = document.createElement("img");
          img.src = url;
          img.alt = file.name;
          img.onload = () => { /* keep url alive for display */ };
          item.appendChild(img);
          previewRow.appendChild(item);
        });
        previewRow.classList.remove("hidden");
        analyzeButton.style.display = "flex";
      });

      // ─── Analyze button ───
      analyzeButton.addEventListener("click", async () => {
        if (!imageInput.files.length) return;
        try {
          analyzeButton.disabled = true;
          showScanningScreen();

          // Simulate step progression while waiting
          const stepTimer1 = setTimeout(() => markStepDone(1, "Produkt identifierad", ""), 1200);
          const stepTimer2 = setTimeout(() => markStepActive(2, "Söker marknadspriser..."), 1400);
          const stepTimer3 = setTimeout(() => markStepDone(2, "Marknadspriser hämtade", ""), 4000);
          const stepTimer4 = setTimeout(() => markStepActive(3, "Beräknar estimat..."), 4200);

          const data = await requestValuation();

          clearTimeout(stepTimer1); clearTimeout(stepTimer2);
          clearTimeout(stepTimer3); clearTimeout(stepTimer4);

          // Mark all steps done quickly
          const name = data?.data ? getDetectedProductName(data.data) : "";
          const comparableCount = data?.data?.valuation?.comparable_count || data?.debug_summary?.total_comparables_fetched || 0;
          markStepDone(1, name ? `${name} identifierad` : "Produkt identifierad", data?.data?.category || "");
          markStepDone(2, `${comparableCount} resultat hittade`, "");
          markStepActive(3, "Beräknar estimat...");

          setTimeout(() => { markStepDone(3, "Estimat klart", ""); setTimeout(() => renderResult(data), 300); }, 400);

        } catch (error) {
          renderResult(error.envelope || buildClientErrorEnvelope({ message: error.message, technicalMessage: error?.stack || null }));
        } finally {
          analyzeButton.disabled = false;
        }
      });

      // ─── Init ───
      lucide.createIcons();
    </script>
  </body>
</html>
