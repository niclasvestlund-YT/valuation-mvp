<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VÄRDEKOLL — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-base: #F7F5F0;
    --bg-surface: #EDEAE3;
    --bg-surface-raised: #FFFFFF;
    --border-subtle: #E8E4DB;
    --border-medium: #D5D0C5;
    --text-primary: #2C2A25;
    --text-secondary: #5C5850;
    --text-muted: #8A8578;
    --text-faint: #B0AA9E;
    --accent-positive: #34a873;
    --accent-warning: #d4a017;
    --accent-danger: #c4432a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg-base);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .admin-header {
    padding: 20px 16px 16px;
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .admin-header h1 {
    font-size: 0.6875rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-faint);
  }

  .admin-header .badge {
    font-size: 0.6875rem;
    font-weight: 500;
    color: var(--accent-positive);
    background: rgba(52, 168, 115, 0.08);
    padding: 4px 10px;
    border-radius: 6px;
  }

  .container {
    max-width: 520px;
    margin: 0 auto;
    padding: 0 16px;
  }

  /* Stats grid */
  .stats-section {
    padding: 24px 0 8px;
  }

  .section-label {
    font-size: 0.6875rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 12px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .stat-card {
    background: var(--bg-surface);
    border-radius: 12px;
    padding: 14px 16px;
  }

  .stat-value {
    font-size: 1.75rem;
    font-weight: 700;
    letter-spacing: -1px;
    color: var(--text-primary);
    line-height: 1.1;
  }

  .stat-label {
    font-size: 0.8125rem;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .stat-change {
    font-size: 0.6875rem;
    font-weight: 500;
    margin-top: 6px;
  }

  .stat-change.up { color: var(--accent-positive); }
  .stat-change.down { color: var(--accent-danger); }
  .stat-change.neutral { color: var(--text-muted); }

  /* Status breakdown */
  .status-section {
    padding: 24px 0 8px;
  }

  .status-bar-container {
    background: var(--bg-surface);
    border-radius: 12px;
    padding: 16px;
  }

  .status-bar {
    display: flex;
    height: 8px;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 14px;
  }

  .status-bar .seg-ok { background: var(--accent-positive); }
  .status-bar .seg-insufficient { background: var(--accent-warning); }
  .status-bar .seg-ambiguous { background: var(--border-medium); }
  .status-bar .seg-error { background: var(--accent-danger); }

  .status-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 4px 16px;
  }

  .status-legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.8125rem;
    color: var(--text-secondary);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .status-legend-item .count {
    font-weight: 600;
    color: var(--text-primary);
  }

  /* Valuations list */
  .list-section {
    padding: 24px 0 32px;
  }

  .valuation-list {
    background: var(--bg-surface);
    border-radius: 12px;
    overflow: hidden;
  }

  .valuation-row {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    gap: 12px;
    border-bottom: 1px solid var(--border-subtle);
    cursor: pointer;
    transition: background 0.15s;
  }

  .valuation-row:last-child { border-bottom: none; }
  .valuation-row:hover { background: rgba(0,0,0,0.015); }

  .valuation-thumb {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--border-subtle);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .valuation-thumb svg {
    width: 18px;
    height: 18px;
    color: var(--text-muted);
  }

  .valuation-info {
    flex: 1;
    min-width: 0;
  }

  .valuation-product {
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .valuation-meta {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .valuation-right {
    text-align: right;
    flex-shrink: 0;
  }

  .valuation-price {
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--text-primary);
  }

  .valuation-confidence {
    font-size: 0.6875rem;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .status-pill {
    display: inline-block;
    font-size: 0.625rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 4px;
  }

  .pill-ok { background: rgba(52, 168, 115, 0.1); color: var(--accent-positive); }
  .pill-insufficient { background: rgba(212, 160, 23, 0.1); color: var(--accent-warning); }
  .pill-ambiguous { background: rgba(138, 133, 120, 0.1); color: var(--text-muted); }
  .pill-error { background: rgba(196, 67, 42, 0.1); color: var(--accent-danger); }
  .pill-degraded { background: rgba(212, 160, 23, 0.08); color: var(--accent-warning); }

  /* Sources section */
  .sources-section {
    padding: 0 0 24px;
  }

  .source-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border-subtle);
  }

  .source-row:last-child { border-bottom: none; }

  .source-name {
    font-size: 0.8125rem;
    color: var(--text-secondary);
  }

  .source-stats {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 0.8125rem;
  }

  .source-success { color: var(--accent-positive); font-weight: 500; }
  .source-fail { color: var(--accent-danger); font-weight: 500; }

  /* Detail panel */
  .detail-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg-base);
    z-index: 100;
    overflow-y: auto;
  }

  .detail-overlay.active { display: block; }

  .detail-header {
    padding: 20px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border-subtle);
    position: sticky;
    top: 0;
    background: var(--bg-base);
    z-index: 1;
  }

  .detail-back {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    padding: 4px;
  }

  .detail-back svg {
    width: 20px;
    height: 20px;
  }

  .detail-title {
    font-size: 0.9375rem;
    font-weight: 600;
  }

  .detail-body {
    padding: 20px 16px 40px;
  }

  .detail-estimate {
    font-size: 2.5rem;
    font-weight: 700;
    letter-spacing: -2px;
    text-align: center;
    padding: 20px 0 8px;
  }

  .detail-range {
    text-align: center;
    font-size: 0.875rem;
    color: var(--text-muted);
    margin-bottom: 24px;
  }

  .detail-field {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border-subtle);
    font-size: 0.8125rem;
  }

  .detail-field-label { color: var(--text-muted); }
  .detail-field-value { color: var(--text-primary); font-weight: 500; }

  .detail-json {
    margin-top: 20px;
    background: var(--bg-surface);
    border-radius: 10px;
    padding: 14px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.6875rem;
    color: var(--text-secondary);
    line-height: 1.6;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }

  @media (min-width: 640px) {
    .container { padding: 0 24px; }
    .stats-grid { grid-template-columns: repeat(4, 1fr); }
  }
</style>
</head>
<body>

<div class="admin-header">
  <h1>VÄRDEKOLL ADMIN</h1>
  <span class="badge">Live</span>
</div>

<div class="container">

  <!-- Stats -->
  <div class="stats-section">
    <div class="section-label">ÖVERSIKT — SENASTE 30 DAGARNA</div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="stat-total">—</div>
        <div class="stat-label">Värderingar</div>
        <div class="stat-change neutral" id="stat-total-change"></div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-ok-pct">—</div>
        <div class="stat-label">Lyckade (ok)</div>
        <div class="stat-change neutral" id="stat-ok-change"></div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-avg-estimate">—</div>
        <div class="stat-label">Snitt estimat (kr)</div>
        <div class="stat-change neutral"></div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-avg-conf">—</div>
        <div class="stat-label">Snitt konfidens</div>
        <div class="stat-change neutral"></div>
      </div>
    </div>
  </div>

  <!-- Status breakdown -->
  <div class="status-section">
    <div class="section-label">STATUSFÖRDELNING</div>
    <div class="status-bar-container">
      <div class="status-bar" id="status-bar"></div>
      <div class="status-legend" id="status-legend"></div>
    </div>
  </div>

  <!-- Sources -->
  <div class="sources-section">
    <div class="section-label">DATAKÄLLOR</div>
    <div class="status-bar-container" id="sources-container">
      <div class="source-row">
        <span class="source-name">Tradera</span>
        <div class="source-stats"><span class="source-success">—</span></div>
      </div>
      <div class="source-row">
        <span class="source-name">Blocket</span>
        <div class="source-stats"><span class="source-success">—</span></div>
      </div>
      <div class="source-row">
        <span class="source-name">Google Shopping</span>
        <div class="source-stats"><span class="source-success">—</span></div>
      </div>
      <div class="source-row">
        <span class="source-name">SerpAPI (fallback)</span>
        <div class="source-stats"><span class="source-success">—</span></div>
      </div>
    </div>
  </div>

  <!-- Recent valuations -->
  <div class="list-section">
    <div class="section-label">SENASTE VÄRDERINGAR</div>
    <div class="valuation-list" id="valuation-list">
      <div class="valuation-row" style="justify-content:center; color: var(--text-muted); font-size: 0.8125rem; padding: 24px;">
        Laddar...
      </div>
    </div>
  </div>

</div>

<!-- Detail panel -->
<div class="detail-overlay" id="detail-panel">
  <div class="detail-header">
    <button class="detail-back" onclick="closeDetail()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <span class="detail-title" id="detail-product-name"></span>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<script>
const ADMIN_KEY = localStorage.getItem('admin_key') || prompt('Admin-nyckel:');
if (ADMIN_KEY) localStorage.setItem('admin_key', ADMIN_KEY);

const headers = { 'X-Admin-Key': ADMIN_KEY || '' };

const categoryIcons = {
  "headphones": `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg>`,
  "laptop": `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 16V7a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v9m16 0H4m16 0 1.28 2.55a1 1 0 0 1-.9 1.45H3.62a1 1 0 0 1-.9-1.45L4 16"/></svg>`,
  "smartphone": `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></svg>`,
  "camera": `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>`,
  "tablet": `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="20" x="4" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></svg>`,
  "default": `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M12 8v8m-4-4h8"/></svg>`
};

function getStatusPill(status) {
  const map = {
    ok: ['OK', 'pill-ok'],
    depreciation_estimate: ['ESTIMAT', 'pill-insufficient'],
    insufficient_evidence: ['FÅ KÄLLOR', 'pill-insufficient'],
    ambiguous_model: ['OTYDLIG', 'pill-ambiguous'],
    error: ['FEL', 'pill-error'],
    degraded: ['DEGRADERAD', 'pill-degraded']
  };
  const [label, cls] = map[status] || ['?', 'pill-error'];
  return `<span class="status-pill ${cls}">${label}</span>`;
}

function formatKr(n) {
  if (n == null) return '—';
  return Math.round(n).toLocaleString('sv-SE') + ' kr';
}

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just nu';
  if (mins < 60) return mins + ' min sedan';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + ' tim sedan';
  const days = Math.floor(hrs / 24);
  return days + ' d sedan';
}

let valuations = [];

async function fetchData() {
  try {
    // Fetch metrics
    const metricsRes = await fetch('/admin/metrics', { headers });
    if (metricsRes.ok) {
      const metrics = await metricsRes.json();
      renderStats(metrics);
    }

    // Fetch valuations
    const valRes = await fetch('/admin/valuations?limit=30', { headers });
    if (valRes.ok) {
      const data = await valRes.json();
      valuations = data.valuations || data || [];
      renderList();
    } else {
      // Fallback: show empty state
      document.getElementById('valuation-list').innerHTML =
        '<div class="valuation-row" style="justify-content:center; color: var(--text-muted); font-size: 0.8125rem; padding: 24px;">Ingen data — DB ej ansluten</div>';
    }
  } catch (e) {
    console.error('Admin fetch failed:', e);
    document.getElementById('valuation-list').innerHTML =
      '<div class="valuation-row" style="justify-content:center; color: var(--text-muted); font-size: 0.8125rem; padding: 24px;">Kunde inte hämta data</div>';
  }
}

function renderStats(m) {
  const statusBreakdown = m.status_breakdown || {};
  const total = Object.values(statusBreakdown).reduce((a, b) => a + b, 0);
  const okCount = statusBreakdown.ok || 0;

  document.getElementById('stat-total').textContent = total || '—';
  document.getElementById('stat-ok-pct').textContent = total > 0 ? Math.round(okCount / total * 100) + '%' : '—';
  document.getElementById('stat-avg-estimate').textContent = m.avg_estimate ? Math.round(m.avg_estimate).toLocaleString('sv-SE') : '—';
  document.getElementById('stat-avg-conf').textContent = m.avg_confidence ? m.avg_confidence.toFixed(2) : '—';

  // Status bar
  const bar = document.getElementById('status-bar');
  const legend = document.getElementById('status-legend');
  if (total > 0) {
    const segments = [
      { key: 'ok', cls: 'seg-ok', color: 'var(--accent-positive)', label: 'ok' },
      { key: 'depreciation_estimate', cls: 'seg-insufficient', color: 'var(--accent-warning)', label: 'estimat' },
      { key: 'insufficient_evidence', cls: 'seg-insufficient', color: 'var(--accent-warning)', label: 'insufficient' },
      { key: 'ambiguous_model', cls: 'seg-ambiguous', color: 'var(--border-medium)', label: 'ambiguous' },
      { key: 'error', cls: 'seg-error', color: 'var(--accent-danger)', label: 'error' },
      { key: 'degraded', cls: 'seg-error', color: 'var(--accent-danger)', label: 'degraded' },
    ];
    bar.innerHTML = segments
      .filter(s => statusBreakdown[s.key])
      .map(s => `<div class="${s.cls}" style="width: ${(statusBreakdown[s.key] / total * 100).toFixed(1)}%"></div>`)
      .join('');
    legend.innerHTML = segments
      .filter(s => statusBreakdown[s.key])
      .map(s => `<div class="status-legend-item"><div class="status-dot" style="background: ${s.color}"></div>${s.label} <span class="count">${statusBreakdown[s.key]}</span></div>`)
      .join('');
  }
}

function renderList() {
  const list = document.getElementById('valuation-list');
  if (!valuations.length) {
    list.innerHTML = '<div class="valuation-row" style="justify-content:center; color: var(--text-muted); font-size: 0.8125rem; padding: 24px;">Inga värderingar ännu</div>';
    return;
  }
  list.innerHTML = valuations.map((v, i) => {
    const model = v.model || v.product || 'Okänd produkt';
    const category = (v.category || '').toLowerCase();
    const icon = categoryIcons[category] || categoryIcons.default;
    const estimate = v.estimated_value || v.fair_estimate;
    const conf = v.confidence || v.vision_confidence;
    const status = v.status || 'error';
    const time = timeAgo(v.created_at);

    return `
    <div class="valuation-row" onclick="openDetail(${i})">
      <div class="valuation-thumb">${icon}</div>
      <div class="valuation-info">
        <div class="valuation-product">${model}</div>
        <div class="valuation-meta">
          ${getStatusPill(status)}
          <span>${time}</span>
        </div>
      </div>
      <div class="valuation-right">
        <div class="valuation-price">${estimate ? formatKr(estimate) : '—'}</div>
        <div class="valuation-confidence">${conf > 0 ? (conf * 100).toFixed(0) + '% konf.' : ''}</div>
      </div>
    </div>`;
  }).join('');
}

function openDetail(idx) {
  const v = valuations[idx];
  if (!v) return;
  const model = v.model || v.product || 'Okänd produkt';
  document.getElementById('detail-product-name').textContent = model;

  const estimate = v.estimated_value || v.fair_estimate;
  const low = v.value_range_low || v.low_estimate;
  const high = v.value_range_high || v.high_estimate;
  const status = v.status || 'error';
  const conf = v.confidence || v.vision_confidence;

  document.getElementById('detail-body').innerHTML = `
    ${estimate ? `
      <div class="detail-estimate">${formatKr(estimate)}</div>
      <div class="detail-range">${formatKr(low)} — ${formatKr(high)}</div>
    ` : `
      <div class="detail-estimate" style="font-size:1.25rem; color: var(--text-muted);">Inget estimat</div>
      <div class="detail-range">${status === 'ambiguous_model' ? 'Modellen kunde inte fastställas' : status === 'error' ? 'Tekniskt fel' : 'Otillräckligt med data'}</div>
    `}

    <div class="detail-field"><span class="detail-field-label">Status</span><span class="detail-field-value">${getStatusPill(status)}</span></div>
    <div class="detail-field"><span class="detail-field-label">Brand</span><span class="detail-field-value">${v.brand || '—'}</span></div>
    <div class="detail-field"><span class="detail-field-label">Kategori</span><span class="detail-field-value">${v.category || '—'}</span></div>
    <div class="detail-field"><span class="detail-field-label">Nypris</span><span class="detail-field-value">${formatKr(v.new_price)}</span></div>
    <div class="detail-field"><span class="detail-field-label">Konfidens</span><span class="detail-field-value">${conf > 0 ? (conf * 100).toFixed(0) + '%' : '—'}</span></div>
    <div class="detail-field"><span class="detail-field-label">Comparables</span><span class="detail-field-value">${v.num_comparables_used ?? v.comparable_count ?? '—'}</span></div>
    <div class="detail-field"><span class="detail-field-label">Condition</span><span class="detail-field-value">${v.condition || '—'}</span></div>
    <div class="detail-field"><span class="detail-field-label">Svarstid</span><span class="detail-field-value">${v.response_time_ms ? v.response_time_ms + ' ms' : '—'}</span></div>
    <div class="detail-field"><span class="detail-field-label">Tidpunkt</span><span class="detail-field-value">${v.created_at ? new Date(v.created_at).toLocaleString('sv-SE') : '—'}</span></div>
    <div class="detail-field"><span class="detail-field-label">ID</span><span class="detail-field-value" style="font-size:0.6875rem;">${v.valuation_id || v.id || '—'}</span></div>

    <div class="section-label" style="margin-top: 24px;">RÅDATA</div>
    <div class="detail-json">${JSON.stringify(v, null, 2)}</div>
  `;

  document.getElementById('detail-panel').classList.add('active');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('active');
}

// Init
fetchData();
</script>

</body>
</html>
